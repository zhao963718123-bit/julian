<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>工程英语手机练习版</title>
<style>
:root {
  --bg:#f8fafc; --card:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --accent:#2563eb; --good:#16a34a; --warn:#ea580c; --soft:#eff6ff;
}
* { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin:0; font-family:Arial,"Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text);
}
.app {
  max-width:560px; margin:0 auto; min-height:100vh; padding:12px 12px 96px;
}
.top {
  position:sticky; top:0; z-index:10; background:rgba(248,250,252,.92); backdrop-filter: blur(10px);
  padding:8px 0 10px;
}
.h1 { font-size:24px; font-weight:700; margin:4px 0; }
.sub { color:var(--muted); font-size:13px; line-height:1.5; }
.panel, .card, .mode-btn, .pill, .input, .bottom-bar {
  background:var(--card); border:1px solid var(--line); border-radius:18px;
}
.panel { padding:12px; margin-top:10px; }
.mode-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
.mode-btn {
  padding:10px 8px; text-align:center; font-size:13px; cursor:pointer; user-select:none;
}
.mode-btn.active { background:var(--soft); border-color:#bfdbfe; color:#1d4ed8; font-weight:700; }
.row { display:flex; gap:8px; }
.row > * { flex:1; }
select, input[type="text"] {
  width:100%; border:none; outline:none; background:transparent; font-size:15px; color:var(--text);
}
.input { padding:12px 14px; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
.stat { padding:10px; text-align:center; background:var(--card); border:1px solid var(--line); border-radius:16px; }
.stat .n { font-size:20px; font-weight:700; margin-top:4px; }
.card {
  margin-top:12px; padding:16px; min-height:260px; display:flex; flex-direction:column; justify-content:space-between;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.label { font-size:12px; color:var(--muted); }
.word { font-size:30px; font-weight:800; line-height:1.2; margin-top:8px; word-break:break-word; }
.ipa { color:#1d4ed8; margin-top:10px; font-size:18px; word-break:break-word; }
.meaning { font-size:24px; font-weight:700; margin-top:12px; line-height:1.35; }
.category { margin-top:12px; color:var(--muted); font-size:13px; }
.actions { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:14px; }
.btn {
  border:none; border-radius:16px; padding:13px 12px; font-size:16px; font-weight:700; cursor:pointer;
}
.btn.primary { background:var(--accent); color:#fff; }
.btn.secondary { background:#fff; border:1px solid var(--line); color:var(--text); }
.btn.good { background:var(--good); color:#fff; }
.btn.warn { background:var(--warn); color:#fff; }
.quiz-box { margin-top:12px; }
.quiz-options { display:grid; grid-template-columns:1fr; gap:8px; margin-top:12px; }
.quiz-option {
  background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px; font-size:16px; text-align:left; cursor:pointer;
}
.quiz-option.correct { border-color:#86efac; background:#f0fdf4; }
.quiz-option.wrong { border-color:#fdba74; background:#fff7ed; }
.bottom-bar {
  position:fixed; left:50%; transform:translateX(-50%); bottom:10px; width:min(536px, calc(100vw - 20px));
  padding:10px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; box-shadow:0 10px 30px rgba(15,23,42,.08);
}
.bottom-btn {
  border:none; background:#fff; border-radius:14px; padding:12px 8px; font-size:15px; font-weight:700; cursor:pointer;
}
.bottom-btn.main { background:var(--accent); color:#fff; }
.small { font-size:12px; color:var(--muted); }
.hidden { display:none !important; }
@media (max-width:380px) {
  .word { font-size:26px; }
  .meaning { font-size:22px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="h1">工程英语手机练习版</div>
    <div class="sub">适合手机单手操作，支持抽背、听音、选择题和自测。</div>
  </div>

  <div class="panel">
    <div class="row">
      <div class="input"><input id="searchInput" type="text" placeholder="搜索英文/中文" /></div>
    </div>
    <div class="row" style="margin-top:8px;">
      <div class="input"><select id="categorySelect"><option value="">全部分类</option></select></div>
    </div>
    <div class="mode-grid">
      <div class="mode-btn active" data-mode="flash">翻卡模式</div>
      <div class="mode-btn" data-mode="listen">听音模式</div>
      <div class="mode-btn" data-mode="quiz">选择题</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="small">词条</div><div class="n" id="totalCount">0</div></div>
      <div class="stat"><div class="small">当前</div><div class="n" id="currentIndex">0</div></div>
      <div class="stat"><div class="small">掌握</div><div class="n" id="knownCount">0</div></div>
    </div>
  </div>

  <div class="card">
    <div>
      <div class="label" id="modeLabel">翻卡模式</div>
      <div class="word" id="wordText">Loading...</div>
      <div class="ipa" id="ipaText"></div>
      <div class="meaning hidden" id="meaningText"></div>
      <div class="category" id="categoryText"></div>

      <div class="quiz-box hidden" id="quizBox">
        <div class="small">请选择正确中文意思</div>
        <div class="quiz-options" id="quizOptions"></div>
      </div>
    </div>

    <div>
      <div class="actions" id="mainActions">
        <button class="btn secondary" id="showBtn">显示答案</button>
        <button class="btn primary" id="speakBtn">读音</button>
      </div>
      <div class="actions" id="markActions" style="margin-top:10px;">
        <button class="btn warn" id="againBtn">再练</button>
        <button class="btn good" id="knowBtn">已掌握</button>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button class="bottom-btn" id="prevBtn">上一个</button>
  <button class="bottom-btn main" id="nextBtn">下一个</button>
  <button class="bottom-btn" id="shuffleBtn">随机</button>
</div>

s", "zh": "月度进度", "ipa": "ˈmʌnθli ˈprəʊɡres", "category": "项目进度"}, {"en": "Outflow Channel", "zh": "排水通道", "ipa": "ˈaʊtfləʊ tʃænl", "category": "项目进度"}, {"en": "Pavement Works", "zh": "路面工程", "ipa": "ˈpeɪvmənt wɜːks", "category": "项目进度"}, {"en": "Physical Progress", "zh": "实体进度", "ipa": "ˈfɪzɪkl ˈprəʊɡres", "category": "项目进度"}, {"en": "Planned Progress", "zh": "计划进度", "ipa": "plænd ˈprəʊɡres", "category": "项目进度"}, {"en": "Prime Coat", "zh": "透层油", "ipa": "praɪm kəʊt", "category": "项目进度"}, {"en": "Progress Report", "zh": "进度报告", "ipa": "ˈprəʊɡres rɪˈpɔːt", "category": "项目进度"}, {"en": "Project Progress", "zh": "项目进度", "ipa": "ˈprɒdʒekt ˈprəʊɡres", "category": "项目进度"}, {"en": "Relocation of Utilities", "zh": "管线迁移", "ipa": "ˌriːləʊˈkeɪʃn ɒv juːˈtɪlətiz", "category": "项目进度"}, {"en": "Remaining Period", "zh": "剩余工期", "ipa": "rɪˈmeɪnɪŋ ˈpɪəriəd", "category": "项目进度"}, {"en": "Roadbed Preparation", "zh": "路基准备", "ipa": "ˈrəʊdbed ˌprepəˈreɪʃn", "category": "项目进度"}, {"en": "Service Duct", "zh": "服务管道", "ipa": "ˈsɜːvɪs dʌkt", "category": "项目进度"}, {"en": "Subbase Layer", "zh": "底基层", "ipa": "ˈsʌbbeɪs ˈleɪə(r)", "category": "项目进度"}, {"en": "Time Progress", "zh": "时间进度", "ipa": "taɪm ˈprəʊɡres", "category": "项目进度"}, {"en": "Topsoil Removal", "zh": "表土清除", "ipa": "ˈtɒpsɔɪl rɪˈmuːvl", "category": "项目进度"}, {"en": "Work Section", "zh": "施工路段", "ipa": "wɜːk ˈsekʃn", "category": "项目进度"}, {"en": "Work Zone", "zh": "作业区", "ipa": "wɜːk zəʊn", "category": "项目进度"}];
const categorySelect = document.getElementById('categorySelect');
const searchInput = document.getElementById('searchInput');
const wordText = document.getElementById('wordText');
const ipaText = document.getElementById('ipaText');
const meaningText = document.getElementById('meaningText');
const categoryText = document.getElementById('categoryText');
const totalCount = document.getElementById('totalCount');
const currentIndexEl = document.getElementById('currentIndex');
const knownCountEl = document.getElementById('knownCount');
const modeLabel = document.getElementById('modeLabel');
const quizBox = document.getElementById('quizBox');
const quizOptions = document.getElementById('quizOptions');
const showBtn = document.getElementById('showBtn');
const speakBtn = document.getElementById('speakBtn');

let mode = 'flash';
let filtered = [...allWords];
let current = 0;
let showAnswer = false;
let known = JSON.parse(localStorage.getItem('eng_known_words') || '[]');

function uniq(arr) { return [...new Set(arr)]; }
function saveKnown() { localStorage.setItem('eng_known_words', JSON.stringify(known)); knownCountEl.textContent = known.length; }
function populateCategories() {
  uniq(allWords.map(x => x.category).filter(Boolean)).sort().forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; categorySelect.appendChild(o);
  });
}
function applyFilter() {
  const q = searchInput.value.trim().toLowerCase();
  const c = categorySelect.value;
  filtered = allWords.filter(x => {
    const text = `${x.en} ${x.zh} ${x.ipa} ${x.category}`.toLowerCase();
    return (!q || text.includes(q)) && (!c || x.category === c);
  });
  if (!filtered.length) {
    filtered = [];
    current = 0;
    renderEmpty();
    return;
  }
  if (current >= filtered.length) current = 0;
  render();
}
function renderEmpty() {
  totalCount.textContent = 0;
  currentIndexEl.textContent = 0;
  wordText.textContent = '没有匹配结果';
  ipaText.textContent = '';
  meaningText.textContent = '';
  categoryText.textContent = '';
  quizBox.classList.add('hidden');
}
function currentWord() { return filtered[current]; }
function render() {
  const item = currentWord();
  if (!item) return renderEmpty();
  totalCount.textContent = filtered.length;
  currentIndexEl.textContent = current + 1;
  knownCountEl.textContent = known.length;
  categoryText.textContent = item.category || '';
  ipaText.textContent = item.ipa ? '/' + item.ipa + '/' : '';

  document.getElementById('mainActions').classList.remove('hidden');
  document.getElementById('markActions').classList.remove('hidden');

  if (mode === 'flash') {
    modeLabel.textContent = '翻卡模式';
    wordText.textContent = item.en;
    meaningText.textContent = item.zh;
    quizBox.classList.add('hidden');
    meaningText.classList.toggle('hidden', !showAnswer);
    showBtn.textContent = showAnswer ? '隐藏答案' : '显示答案';
  } else if (mode === 'listen') {
    modeLabel.textContent = '听音模式';
    wordText.textContent = showAnswer ? item.en : '点击“读音”先听，再猜词义';
    meaningText.textContent = item.zh;
    meaningText.classList.toggle('hidden', !showAnswer);
    quizBox.classList.add('hidden');
    showBtn.textContent = showAnswer ? '隐藏答案' : '显示答案';
  } else if (mode === 'quiz') {
    modeLabel.textContent = '选择题';
    wordText.textContent = item.en;
    meaningText.classList.add('hidden');
    showBtn.textContent = '重出题目';
    quizBox.classList.remove('hidden');
    buildQuiz();
  }
}
function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => /^en/i.test(v.lang)) || voices[0];
  if (voice) u.voice = voice;
  u.rate = 0.9;
  speechSynthesis.speak(u);
}
function nextWord(random=false) {
  if (!filtered.length) return;
  showAnswer = false;
  current = random ? Math.floor(Math.random() * filtered.length) : (current + 1) % filtered.length;
  render();
}
function prevWord() {
  if (!filtered.length) return;
  showAnswer = false;
  current = (current - 1 + filtered.length) % filtered.length;
  render();
}
function markKnown() {
  const item = currentWord();
  if (!item) return;
  const key = item.en + '|' + item.zh;
  if (!known.includes(key)) known.push(key);
  saveKnown();
  nextWord();
}
function markAgain() {
  nextWord();
}
function buildQuiz() {
  const item = currentWord();
  const pool = allWords.filter(x => x.zh !== item.zh);
  const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.zh);
  const options = [...shuffled, item.zh].sort(() => Math.random() - 0.5);
  quizOptions.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => {
      if (opt === item.zh) {
        btn.classList.add('correct');
        setTimeout(() => { markKnown(); }, 500);
      } else {
        btn.classList.add('wrong');
        [...quizOptions.children].forEach(c => {
          if (c.textContent === item.zh) c.classList.add('correct');
        });
      }
    };
    quizOptions.appendChild(btn);
  });
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    showAnswer = false;
    render();
  });
});
searchInput.addEventListener('input', applyFilter);
categorySelect.addEventListener('change', applyFilter);
document.getElementById('showBtn').addEventListener('click', () => {
  if (mode === 'quiz') {
    buildQuiz();
    return;
  }
  showAnswer = !showAnswer;
  render();
});
document.getElementById('speakBtn').addEventListener('click', () => {
  const item = currentWord(); if (item) speak(item.en);
});
document.getElementById('nextBtn').addEventListener('click', () => nextWord());
document.getElementById('prevBtn').addEventListener('click', prevWord);
document.getElementById('shuffleBtn').addEventListener('click', () => nextWord(true));
document.getElementById('knowBtn').addEventListener('click', markKnown);
document.getElementById('againBtn').addEventListener('click', markAgain);

populateCategories();
saveKnown();
applyFilter();
</script>
</body>
</html>
